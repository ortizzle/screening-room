<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Screening Room</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1C1414">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Screening Room">
<meta name="description" content="Personal movie & TV tracker — now showing: Chris's watchlist.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Libre+Franklin:ital,wght@0,300..800;1,400&display=swap');

:root{
  --velvet:#1C1414;
  --card:#261C1A;
  --card-2:#302422;
  --line:#453430;
  --cream:#F3E9D7;
  --dim:#A08D7E;
  --gold:#D9A441;
  --red:#B5483C;
  --green:#7BAF8C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--velvet);
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, #2E2018 0%, transparent 60%);
  color:var(--cream);
  font-family:'Libre Franklin',system-ui,sans-serif;
  min-height:100vh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(60px + env(safe-area-inset-bottom));
}
.wrap{max-width:960px;margin:0 auto;padding:0 20px}

button{cursor:pointer;font:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* header */
header{padding-top:28px;position:relative}
header h1{
  font-family:'Archivo',sans-serif;
  font-variation-settings:'wdth' 72;
  font-weight:800;
  font-size:clamp(26px,5.5vw,40px);
  color:var(--gold);
  letter-spacing:1px;
  text-transform:uppercase;
}
header .now{font-size:11px;letter-spacing:4px;color:var(--dim);text-transform:uppercase;margin-top:5px}
header .rule{height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:14px;border-radius:2px}
.gear{
  position:absolute;top:24px;right:0;background:#241b18;border:1px solid #6d5347;
  color:var(--cream);border-radius:10px;width:40px;height:40px;font-size:18px;
  display:flex;align-items:center;justify-content:center;
}
.gear:hover{border-color:var(--gold);color:var(--gold);background:#2c211d}

.searchbar{margin-top:18px;display:flex;gap:10px;position:relative}
.searchbar input{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:13px 16px;color:var(--cream);font:inherit;font-size:15px;min-width:0;
}
.searchbar input::placeholder{color:var(--dim)}
.searchbar button{
  background:var(--red);border:none;border-radius:12px;padding:0 22px;
  font-weight:700;color:var(--cream);letter-spacing:.5px;
}
.searchbar button:disabled{opacity:.5;cursor:default}

/* search results panel */
.results{
  margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;
}
.result{
  display:flex;gap:12px;align-items:center;padding:10px 12px;cursor:pointer;
  border-bottom:1px solid var(--line);
}
.result:last-child{border-bottom:none}
.result:hover{background:var(--card-2)}
.result .poster-mini{width:46px;height:68px}
.result .r-title{font-weight:700;font-size:14px}
.result .r-meta{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:3px}

/* add-to-list chooser */
.addflow{padding:16px}
.addflow-head{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.addflow-head .poster-mini{width:46px;height:68px}
.addflow-head .r-title{font-weight:700;font-size:15px;line-height:1.2}
.addflow-head .r-meta{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.addflow-q{font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:12px}
.addflow-opts{display:flex;flex-direction:column;gap:10px}
.addflow-opt{
  display:flex;align-items:center;width:100%;text-align:left;
  background:var(--card-2);border:1px solid var(--line);border-left-width:4px;
  border-radius:12px;padding:15px 16px;color:var(--cream);
}
.addflow-opt:hover,.addflow-opt:focus-visible{border-color:var(--gold);background:#3a2c27}
.addflow-opt.watching{border-left-color:var(--green)}
.addflow-opt.waiting{border-left-color:var(--gold)}
.addflow-opt.finished{border-left-color:var(--red)}
.addflow-opt .lbl{flex:1;font-weight:800;font-size:16px;letter-spacing:.3px}
.addflow-opt .sub{display:block;font-weight:400;font-size:12px;color:var(--dim);margin-top:3px;letter-spacing:.2px}
.addflow-opt .arr{color:var(--dim);font-size:20px;margin-left:8px}
.addflow-tags{margin-bottom:18px}
.addflow-tags .addflow-q{margin-bottom:10px}
.addflow-tags .tags-row{justify-content:center}
.addflow-cancel{
  display:block;margin:14px auto 0;background:none;border:none;color:var(--dim);
  font-size:13px;font-weight:600;padding:8px 16px;
}
.addflow-cancel:hover{color:var(--cream)}

.section-label{
  font-size:11px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;
  margin:30px 0 12px;text-align:center;
}
.section-label::before{content:'— '}
.section-label::after{content:' —'}

/* continue watching */
.cw-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cw-row::-webkit-scrollbar{display:none}
.cw-card{
  min-width:265px;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:14px;display:flex;gap:12px;cursor:pointer;
}
.cw-card:hover{border-color:var(--gold)}
.poster-mini{
  width:52px;height:76px;border-radius:6px;flex-shrink:0;border:1px solid var(--line);
  display:flex;align-items:flex-end;padding:5px;overflow:hidden;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;line-height:1.15;
  background-size:cover;background-position:center;
}
.cw-card h3{font-size:15px;font-weight:700}
.cw-card .next{font-size:12px;color:var(--gold);margin-top:3px;font-weight:600;letter-spacing:.5px}
.cw-card .ep-title{font-size:12px;color:var(--dim);margin-top:2px;font-style:italic}
.cw-inline-btn{
  margin-top:8px;background:#241b18;border:1px solid #6d5347;color:var(--cream);
  border-radius:8px;font-size:11px;font-weight:600;padding:5px 10px;
}
.cw-inline-btn:hover{border-color:var(--gold);color:var(--gold);background:#2c211d}
.providers{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.chip{
  font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;
  background:var(--card-2);border:1px solid var(--line);color:var(--cream);
  text-decoration:none;display:inline-block;
}
.chip.stream{border-color:#3F5A48;color:var(--green)}
.chip.rent{border-color:#5F4A28;color:var(--gold)}
a.chip:hover{filter:brightness(1.2)}
.watch-link{font-size:11px;color:var(--gold);text-decoration:none;font-weight:600;letter-spacing:.5px}
.watch-link:hover{text-decoration:underline}

/* tabs */
.tabs{display:flex;gap:8px;margin:28px 0 18px;flex-wrap:nowrap}
.tab{
  flex:1;min-width:0;text-align:center;white-space:nowrap;
  border:1px solid var(--line);background:var(--card);color:var(--dim);
  font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;
  padding:11px 6px;border-radius:10px;
}
.tab.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 14px rgba(217,164,65,.15)}
.tab .count{opacity:.7;font-size:11px;margin-left:4px}

/* finished sort/filter bar */
.sortbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 0 16px}
.sort-chip{
  background:#241b18;border:1px solid #6d5347;color:var(--dim);border-radius:99px;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 13px;
}
.sort-chip:hover{border-color:var(--gold)}
.sort-chip.active{border-color:var(--gold);color:var(--gold)}

/* tags: small display chips on cards + editable picker on detail */
.tags-mini{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.chip.tag{border-color:rgba(217,164,65,.55);color:var(--gold)}
.tag-editor{border-top:1px dashed var(--line);margin-top:16px;padding-top:14px}
.tags-row{display:flex;gap:8px;flex-wrap:wrap}
.tag-chip{
  background:var(--card-2);border:1px solid var(--line);color:var(--dim);border-radius:99px;
  font-size:12px;font-weight:700;letter-spacing:.3px;padding:8px 14px;min-height:36px;
}
.tag-chip:hover{border-color:var(--gold)}
.tag-chip.active{border-color:var(--gold);color:var(--gold);background:rgba(217,164,65,.14)}
.tag-add-row{display:flex;gap:8px;margin-top:12px}
.tag-add-row input{
  flex:1;background:var(--card-2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;color:var(--cream);font:inherit;font-size:13px;min-width:0;
}

/* box office report */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}
.stat{background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:16px 12px;text-align:center}
.stat .num{
  font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 78;font-weight:800;
  font-size:28px;color:var(--gold);line-height:1;
}
.stat .lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-top:7px;line-height:1.4}
.report-cta{text-align:center;margin-top:34px}

/* newly-streamable celebration badge */
.new-badge{
  display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;
  padding:4px 10px;border-radius:99px;text-transform:uppercase;
  background:rgba(123,175,140,.16);border:1px solid var(--green);color:var(--green);
  margin-top:8px;
}

/* external score chips (OMDb) */
.score-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.score-chip{
  font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 9px;border-radius:99px;
  background:var(--card-2);border:1px solid var(--line);color:var(--cream);
}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
.title-card{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;position:relative}
.title-card:hover{border-color:var(--gold)}
.poster{
  aspect-ratio:2/3;display:flex;align-items:flex-end;padding:12px;
  font-weight:800;font-size:15px;text-transform:uppercase;line-height:1.15;letter-spacing:.3px;
  background-size:cover;background-position:center;color:var(--cream);
  text-shadow:0 1px 4px rgba(0,0,0,.6);
}
.title-card .meta{padding:10px 12px}
.kind{font-size:10px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase}
.bar{height:5px;background:var(--card-2);border-radius:99px;margin-top:9px;overflow:hidden;clear:both}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#E8C070);border-radius:99px}
.pct{font-size:11px;color:var(--gold);float:right;font-weight:700}
.card-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.mini-btn{
  background:#241b18;border:1px solid #6d5347;color:var(--cream);border-radius:8px;
  font-size:11px;font-weight:600;padding:5px 9px;
}
.mini-btn:hover{border-color:var(--gold);color:var(--gold);background:#2c211d}
.mini-btn.danger{color:#d98a80;border-color:rgba(181,72,60,.5)}
.mini-btn.danger:hover{border-color:var(--red);color:#eab6ad;background:#2c211d}
.mini-btn.confirming{border-color:var(--red);color:#eab6ad}

/* detail */
.detail{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-top:26px}
.detail-head{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.detail-head .poster-mini{width:64px;height:94px}
.detail-head h2{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 78;font-weight:800;font-size:24px;color:var(--gold);letter-spacing:.5px;text-transform:uppercase}
.detail-head .sub{font-size:12px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px}
.detail-head .crew{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.5}
.detail-top-actions{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.season{border-top:1px dashed var(--line);margin-top:16px;padding-top:14px}
.season-row{display:flex;align-items:center;gap:12px}
.season-row h4{
  flex:1;cursor:pointer;
  font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 78;
  font-weight:800;font-size:16px;letter-spacing:.5px;text-transform:uppercase;
  color:var(--gold);
}
/* a fully-watched season recedes so the one you're on stands out */
.season.done .season-row h4{color:var(--dim)}
.season-row .sub2{
  color:var(--dim);font-weight:400;font-size:12px;
  font-family:'Libre Franklin',system-ui,sans-serif;font-variation-settings:normal;
  letter-spacing:0;text-transform:none;
}
.season-row .sub2.complete{color:var(--green);font-weight:600}
.season-row .sub2.avg{color:var(--gold);font-weight:600}
.mark-btn{
  background:#241b18;border:1px solid #6d5347;color:var(--cream);border-radius:8px;
  font-size:12px;font-weight:600;padding:6px 12px;
}
.mark-btn:hover{border-color:var(--gold);color:var(--gold);background:#2c211d}
/* shaded states: green fill once a season is fully watched,
   gold fill on the season you're actively working through */
.mark-btn.complete{
  background:rgba(123,175,140,.16);border-color:#3F5A48;color:var(--green);
}
.mark-btn.complete:hover{background:rgba(123,175,140,.24);border-color:var(--green);color:var(--green)}
.mark-btn.active{
  background:rgba(217,164,65,.14);border-color:rgba(217,164,65,.55);color:var(--gold);
}
.mark-btn.active:hover{background:rgba(217,164,65,.22);border-color:var(--gold);color:var(--gold)}
.mark-btn.danger{color:#d98a80;border-color:rgba(181,72,60,.5)}
.mark-btn.danger:hover{border-color:var(--red);color:#eab6ad;background:#2c211d}
.eps{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.ep{
  display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:9px;
  background:var(--card-2);cursor:pointer;user-select:none;
}
.ep-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.ep-line1{display:flex;align-items:baseline;gap:9px}
.ep .code{font-size:11px;color:var(--gold);width:30px;font-weight:700;flex-shrink:0}
.ep .name{flex:1;font-size:13px;min-width:0;line-height:1.3}
.checkbox{
  width:19px;height:19px;border-radius:50%;border:1.5px solid var(--line);margin-top:1px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:#241A0A;flex-shrink:0;
}
.ep.seen .checkbox{background:var(--gold);border-color:var(--gold)}
.ep.seen .name{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--line)}
.ep.seen .code{color:var(--dim);font-weight:600}
.ep-rate{display:flex;align-items:center;gap:10px;padding-left:39px}
.ep-score{font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.2px;white-space:nowrap}
/* standout episode (TMDB 8.0+) gets the gold treatment */
.ep-score.hot{color:var(--gold);font-weight:700}
.ep-stars{display:flex;gap:1px}
.ep-star{font-size:16px;line-height:1;color:var(--line);background:none;border:none;padding:0 1px}
.ep-star.on{color:var(--gold)}
.ep-star:hover{color:var(--gold);opacity:.85}

/* rating flow */
.rate-box{border-top:1px dashed var(--line);margin-top:16px;padding-top:16px}
.stars-input{display:flex;gap:6px}
.star{font-size:34px;line-height:1;color:var(--line);background:none;border:none;padding:2px}
.star.on{color:var(--gold)}
.star.half{
  background:linear-gradient(90deg, var(--gold) 50%, var(--line) 50%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.rate-hint{font-size:11px;color:var(--dim);margin-top:8px}
.history{border-top:1px dashed var(--line);margin-top:18px;padding-top:14px}
.hist-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.hist-line{font-size:13px;color:var(--dim);margin-top:8px;line-height:1.5}
.rate-box textarea{
  width:100%;margin-top:14px;background:var(--card-2);border:1px solid var(--line);
  border-radius:10px;padding:12px;color:var(--cream);font:inherit;font-size:14px;min-height:90px;resize:vertical;
}
.toggle-row{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.toggle{
  border:1px solid var(--line);background:var(--card-2);color:var(--dim);border-radius:99px;
  padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
}
.toggle.rec-yes{border-color:#3F5A48;color:var(--green)}
.toggle.rec-no{border-color:var(--red);color:var(--red)}
.primary-btn{
  background:var(--red);border:none;color:var(--cream);border-radius:10px;
  padding:11px 20px;font-weight:700;letter-spacing:.5px;
}
.primary-btn:hover{filter:brightness(1.1)}
.ghost-btn{
  background:#241b18;border:1px solid #6d5347;color:var(--cream);border-radius:10px;
  padding:11px 18px;font-weight:600;
}
.ghost-btn:hover{border-color:var(--gold);color:var(--gold);background:#2c211d}
.ghost-btn.key{color:var(--gold);border-color:rgba(217,164,65,.55);font-weight:700}

/* ticket-stub review */
.ticket{
  margin-top:14px;position:relative;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  display:flex;overflow:hidden;cursor:pointer;
}
.ticket:hover{border-color:var(--gold)}
.ticket .stub{
  background:var(--red);color:var(--cream);width:86px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  border-right:2px dashed var(--velvet);padding:14px 8px;
}
.ticket .stub .admit{font-size:9px;letter-spacing:2px;writing-mode:vertical-rl;transform:rotate(180deg);opacity:.85}
.ticket .stub .stars{font-size:18px;letter-spacing:1px;writing-mode:vertical-rl;transform:rotate(180deg);color:#F5D98A}
.ticket .stub .stars .sempty{opacity:.38}
.ticket .body{padding:16px 18px;flex:1;min-width:0;position:relative}
.ticket .body.stamped .top{padding-right:112px}
.ticket .body .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.ticket h3{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 78;font-weight:800;font-size:18px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.rec{
  font-size:10px;letter-spacing:1.5px;color:var(--green);
  border:1px solid #3F5A48;padding:4px 10px;border-radius:99px;text-transform:uppercase;font-weight:700;
}
.rec.times{color:var(--gold);border-color:rgba(217,164,65,.5)}
.stamp{
  position:absolute;top:12px;right:14px;pointer-events:none;
  font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 90;font-weight:800;
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--green);border:2px solid var(--green);border-radius:8px;
  padding:4px 9px;transform:rotate(-9deg);
}
.stamp::after{
  content:'';position:absolute;inset:-4px;border:1px solid var(--green);border-radius:10px;opacity:.4;
}
.stamp.no{color:var(--red);border-color:var(--red)}
.stamp.no::after{border-color:var(--red)}
.ticket p.take{font-size:14px;color:var(--dim);margin-top:8px;line-height:1.55}
.ticket .yr{font-size:11px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}
.ticket-share{
  margin-top:14px;display:inline-flex;align-items:center;gap:6px;
  background:#2b211d;border:1px solid #6d5347;color:var(--cream);
  border-radius:8px;font-size:12px;font-weight:600;padding:7px 13px;letter-spacing:.3px;
}
.ticket-share:hover,.ticket-share:focus-visible{border-color:var(--gold);color:var(--gold);background:#332722}
.ticket-share .share-ico{font-size:14px;font-weight:700}
.ticket::before,.ticket::after{
  content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:var(--velvet);left:78px;
}
.ticket::before{top:-8px}
.ticket::after{bottom:-8px}

/* setup / settings screen */
.setup{max-width:560px;margin:40px auto 0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px}
.setup h2{font-family:'Archivo',sans-serif;font-variation-settings:'wdth' 78;font-weight:800;font-size:22px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
.setup p{font-size:14px;color:var(--dim);line-height:1.6;margin-top:12px}
.setup ol{margin:14px 0 0 20px;font-size:14px;color:var(--cream);line-height:1.7}
.setup ol a{color:var(--gold)}
.setup .field{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
.setup input{
  flex:1;background:var(--card-2);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;color:var(--cream);font:inherit;font-size:14px;min-width:200px;
}
.msg{margin-top:14px;font-size:13px;border-radius:10px;padding:11px 14px;display:none}
.msg.err{display:block;background:rgba(181,72,60,.15);border:1px solid var(--red);color:#E8A99F}
.msg.ok{display:block;background:rgba(123,175,140,.13);border:1px solid #3F5A48;color:var(--green)}
.setup .divider{border-top:1px dashed var(--line);margin:22px 0}
.setup .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}

.notice{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--card-2);border:1px solid var(--gold);color:var(--cream);
  padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:50;
  box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:90%;text-align:center;
}
.empty{text-align:center;color:var(--dim);font-size:14px;line-height:1.6;padding:40px 20px}
.empty b{color:var(--cream)}
.loading{text-align:center;color:var(--dim);font-size:13px;letter-spacing:2px;text-transform:uppercase;padding:26px}
.spinner{
  width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--gold);
  border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

footer{margin-top:40px;text-align:center;font-size:10px;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
footer .ver{margin-top:6px;font-size:9px;letter-spacing:2px;color:var(--gold);opacity:.7}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;transition:none !important}
  .spinner{animation:none;border-top-color:var(--gold)}
}
@media (max-width:480px){
  .searchbar button{padding:0 16px}
  .detail-top-actions{width:100%;margin-left:0}
}
</style>

<body>
<div class="wrap" id="app"></div>
<script>
"use strict";
(function(){

/* ---------- constants ---------- */
var APP_VERSION = 'v1.5 · Marquee Share';
var KEY_STORE = 'sr_tmdb_key';
var LIB_STORE = 'sr_library_v1';
var META_STORE = 'sr_meta_cache_v1';
var IMG = 'https://image.tmdb.org/t/p/w342';
var API = 'https://api.themoviedb.org/3';
var PROVIDER_TTL = 24 * 60 * 60 * 1000;
var THEATRICAL_WINDOW_DAYS = 150; // how long after release a no-provider movie is still treated as "in theaters"
var PRE_RELEASE_SHOWTIME_DAYS = 14; // how soon before release theaters typically open showtimes/presales
var DEFAULT_TAGS = ['Family Movie Night', 'Date Night', 'Rewatch', "Kids' Pick"];
var POSTER_GRADIENTS = [
  'linear-gradient(160deg,#28425E,#101E2E)',
  'linear-gradient(160deg,#4E5040,#26281C)',
  'linear-gradient(160deg,#6E3230,#2A1210)',
  'linear-gradient(160deg,#8A6A2E,#3A2A0E)',
  'linear-gradient(160deg,#2E5E8A,#0E2A3A)',
  'linear-gradient(160deg,#4A2E5E,#1E0E2A)'
];

/* ---------- credential (kept in closure, never rendered) ---------- */
var cred = null; // {type:'v3'|'v4', value:string}

function loadCred(){
  try{
    var raw = localStorage.getItem(KEY_STORE);
    if(!raw) return null;
    var v = JSON.parse(raw);
    if(v && v.type && v.value) return v;
  }catch(e){}
  return null;
}
function saveCred(c){
  try{ localStorage.setItem(KEY_STORE, JSON.stringify(c)); return true; }
  catch(e){ return false; }
}
function clearCred(){
  try{ localStorage.removeItem(KEY_STORE); }catch(e){}
  cred = null;
}
function detectCred(raw){
  var t = (raw||'').trim();
  if(!t) return null;
  // v4 read access tokens are long JWTs starting with eyJ
  if(t.indexOf('eyJ') === 0) return {type:'v4', value:t};
  return {type:'v3', value:t};
}

/* ---------- optional OMDb key (RT / IMDb / Metacritic scores) ---------- */
var OMDB_STORE = 'sr_omdb_key';
var omdbKey = null;
function loadOmdbKey(){
  try{ return localStorage.getItem(OMDB_STORE) || null; }catch(e){ return null; }
}
function saveOmdbKey(k){
  try{ localStorage.setItem(OMDB_STORE, k); return true; }catch(e){ return false; }
}
function clearOmdbKey(){
  try{ localStorage.removeItem(OMDB_STORE); }catch(e){}
  omdbKey = null;
}

/* ---------- TMDB fetch wrapper ---------- */
function tmdb(path, params){
  params = params || {};
  var url = API + path;
  var qs = [];
  for(var k in params){ if(params[k]!=null) qs.push(encodeURIComponent(k)+'='+encodeURIComponent(params[k])); }
  var headers = {};
  if(cred && cred.type === 'v4'){
    headers['Authorization'] = 'Bearer ' + cred.value;
  }else if(cred && cred.type === 'v3'){
    qs.push('api_key=' + encodeURIComponent(cred.value));
  }
  if(qs.length) url += '?' + qs.join('&');
  return fetch(url, {headers:headers}).then(function(res){
    if(res.status === 401) throw new Error('BAD_KEY');
    if(res.status === 429) throw new Error('RATE_LIMIT');
    if(!res.ok) throw new Error('HTTP_' + res.status);
    return res.json();
  });
}
function errMessage(e){
  var m = (e && e.message) || '';
  if(m === 'BAD_KEY') return 'TMDB rejected the key. Open settings (⚙) and re-enter it.';
  if(m === 'RATE_LIMIT') return 'TMDB is rate-limiting us (429). Give it a moment and try again.';
  if(m.indexOf('HTTP_') === 0) return 'TMDB returned an error ('+m.slice(5)+'). Try again shortly.';
  return 'Network trouble reaching TMDB. Check your connection and retry.';
}

/* ---------- library store ---------- */
function loadLib(){
  try{
    var raw = localStorage.getItem(LIB_STORE);
    if(!raw) return [];
    var v = JSON.parse(raw);
    return Array.isArray(v) ? v : [];
  }catch(e){ return []; }
}
function saveLib(){
  try{ localStorage.setItem(LIB_STORE, JSON.stringify(lib)); }catch(e){}
}
function loadMeta(){
  try{
    var raw = localStorage.getItem(META_STORE);
    if(!raw) return {};
    var v = JSON.parse(raw);
    return (v && typeof v === 'object') ? v : {};
  }catch(e){ return {}; }
}
function saveMeta(){
  try{ localStorage.setItem(META_STORE, JSON.stringify(metaCache)); }catch(e){}
}

var lib = loadLib();
var metaCache = loadMeta();

function entryKey(type, id){ return type + ':' + id; }
function findEntry(type, id){
  for(var i=0;i<lib.length;i++){ if(lib[i].type===type && lib[i].id===id) return lib[i]; }
  return null;
}

/* ---------- tags ---------- */
function entryHasTag(entry, tag){ return (entry.tags||[]).indexOf(tag) !== -1; }
function allKnownTags(){
  var set = {};
  DEFAULT_TAGS.forEach(function(t){ set[t]=true; });
  lib.forEach(function(e){ (e.tags||[]).forEach(function(t){ set[t]=true; }); });
  var custom = Object.keys(set).filter(function(t){ return DEFAULT_TAGS.indexOf(t)===-1; })
    .sort(function(a,b){ return a.localeCompare(b); });
  return DEFAULT_TAGS.concat(custom);
}
function toggleTag(entry, tag){
  entry.tags = entry.tags || [];
  var idx = entry.tags.indexOf(tag);
  if(idx===-1) entry.tags.push(tag); else entry.tags.splice(idx,1);
  saveLib();
}
function addCustomTag(entry, raw){
  var t = (raw||'').trim().slice(0,30);
  if(!t) return false;
  entry.tags = entry.tags || [];
  if(entry.tags.indexOf(t)===-1){ entry.tags.push(t); saveLib(); }
  return true;
}

/* ---------- small DOM helpers ---------- */
function el(tag, cls, text){
  var n = document.createElement(tag);
  if(cls) n.className = cls;
  if(text != null) n.textContent = text;
  return n;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }
function on(node, ev, fn){ node.addEventListener(ev, fn); return node; }

function posterStyle(node, posterPath, seedTitle){
  if(posterPath){
    node.style.backgroundImage = 'url("' + IMG + posterPath + '")';
    node.textContent = '';
  }else{
    var seed = 0, s = seedTitle||'';
    for(var i=0;i<s.length;i++) seed += s.charCodeAt(i);
    node.style.background = POSTER_GRADIENTS[seed % POSTER_GRADIENTS.length];
    node.textContent = seedTitle || '';
  }
}

var app = document.getElementById('app');
var noticeTimer = null;
function notice(text){
  var existing = document.querySelector('.notice');
  if(existing) existing.parentNode.removeChild(existing);
  var n = el('div','notice', text);
  document.body.appendChild(n);
  if(noticeTimer) clearTimeout(noticeTimer);
  noticeTimer = setTimeout(function(){ if(n.parentNode) n.parentNode.removeChild(n); }, 3200);
}

/* ---------- view state ---------- */
var state = { view:'home', tab:'watching', detail:null, finSort:'new', finRec:false, tagFilter:null }; // detail: {type,id}

/* ========================================================= */
/* SETUP / SETTINGS SCREEN                                    */
/* ========================================================= */
function renderSetup(isSettings){
  state.view = isSettings ? 'settings' : 'setup';
  clear(app);
  renderHeader(false);

  if(isSettings){
    var backTop = el('button','ghost-btn key','‹ Back');
    backTop.style.marginTop = '20px';
    on(backTop, 'click', goHome);
    app.appendChild(backTop);
  }

  var box = el('div','setup');
  box.appendChild(el('h2', null, isSettings ? 'Settings' : 'Welcome to the Screening Room'));
  box.appendChild(el('p', null, isSettings
    ? 'Your TMDB credential lives only in this browser. Update or clear it below.'
    : 'This tracker pulls movie & TV data from TMDB — a free, no-credit-card API. One quick setup and you are in.'));

  if(!isSettings || !cred){
    var ol = el('ol');
    var li1 = el('li'); li1.appendChild(document.createTextNode('Create a free account at '));
    var a1 = el('a', null, 'themoviedb.org'); a1.href='https://www.themoviedb.org/signup'; a1.target='_blank'; a1.rel='noopener';
    li1.appendChild(a1);
    ol.appendChild(li1);
    ol.appendChild(el('li','', 'Go to Settings → API and request a Developer key (free, instant, no card).'));
    var li3 = el('li'); li3.appendChild(document.createTextNode('Copy either your '));
    var b1 = el('b', null, 'API Key (v3)'); li3.appendChild(b1);
    li3.appendChild(document.createTextNode(' or your '));
    var b2 = el('b', null, 'API Read Access Token (v4)'); li3.appendChild(b2);
    li3.appendChild(document.createTextNode(' and paste it below.'));
    ol.appendChild(li3);
    box.appendChild(ol);
  }

  var field = el('div','field');
  var input = el('input');
  input.type = 'password';
  input.placeholder = 'Paste TMDB v3 key or v4 token';
  input.autocomplete = 'off';
  input.spellcheck = false;
  field.appendChild(input);
  var saveBtn = el('button','primary-btn', cred && isSettings ? 'Replace key' : 'Save & verify');
  field.appendChild(saveBtn);
  box.appendChild(field);

  var msg = el('div','msg');
  box.appendChild(msg);

  function showMsg(cls, text){ msg.className = 'msg ' + cls; msg.textContent = text; }

  on(saveBtn, 'click', function(){
    var c = detectCred(input.value);
    if(!c){ showMsg('err','Paste your key or token first.'); return; }
    saveBtn.disabled = true;
    var prevCred = cred;
    cred = c; // temporarily use for validation
    showMsg('ok','Verifying with TMDB…');
    tmdb('/configuration').then(function(){
      if(!saveCred(c)){ throw new Error('STORE'); }
      showMsg('ok','Verified. Key saved to this browser only.');
      setTimeout(function(){ renderHome(); }, 500);
    }).catch(function(e){
      cred = prevCred;
      saveBtn.disabled = false;
      if(e && e.message === 'STORE'){ showMsg('err','Could not write to localStorage (private mode?).'); }
      else{ showMsg('err', errMessage(e)); }
    });
  });
  on(input, 'keydown', function(e){ if(e.key === 'Enter') saveBtn.click(); });

  if(isSettings){
    box.appendChild(el('div','divider'));
    var row = el('div','row');

    var exportBtn = el('button','ghost-btn','Export library JSON');
    on(exportBtn, 'click', doExport);
    row.appendChild(exportBtn);

    var importBtn = el('button','ghost-btn','Import library JSON');
    var fileInput = el('input'); fileInput.type='file'; fileInput.accept='application/json,.json'; fileInput.style.display='none';
    on(importBtn, 'click', function(){ fileInput.click(); });
    on(fileInput, 'change', function(){ if(fileInput.files && fileInput.files[0]) doImport(fileInput.files[0]); });
    row.appendChild(importBtn);
    row.appendChild(fileInput);

    if(cred){
      var clearBtn = el('button','ghost-btn','Clear key');
      clearBtn.dataset.armed = '';
      on(clearBtn, 'click', function(){
        if(clearBtn.dataset.armed !== '1'){
          clearBtn.dataset.armed = '1';
          clearBtn.textContent = 'Tap again to clear';
          clearBtn.classList.add('mini-btn','danger');
          return;
        }
        clearCred();
        notice('TMDB key cleared.');
        renderSetup(false);
      });
      row.appendChild(clearBtn);
    }

    box.appendChild(row);

    // optional OMDb key → Rotten Tomatoes / IMDb / Metacritic scores
    box.appendChild(el('div','divider'));
    var oHead = el('p');
    oHead.appendChild(document.createTextNode('Extra ratings (optional): a free '));
    var oa = el('a', null, 'OMDb key'); oa.href='https://www.omdbapi.com/apikey.aspx'; oa.target='_blank'; oa.rel='noopener';
    oa.style.color = 'var(--gold)';
    oHead.appendChild(oa);
    oHead.appendChild(document.createTextNode(' adds Rotten Tomatoes, IMDb, and Metacritic scores to detail pages.'));
    box.appendChild(oHead);

    var oField = el('div','field');
    var oInput = el('input');
    oInput.type = 'password';
    oInput.placeholder = omdbKey ? 'OMDb key saved — paste to replace' : 'Paste OMDb API key';
    oInput.autocomplete = 'off'; oInput.spellcheck = false;
    oField.appendChild(oInput);
    var oSave = el('button','primary-btn', omdbKey ? 'Replace' : 'Save');
    oField.appendChild(oSave);
    box.appendChild(oField);
    var oMsg = el('div','msg');
    box.appendChild(oMsg);
    function oShow(cls, text){ oMsg.className = 'msg ' + cls; oMsg.textContent = text; }

    on(oSave, 'click', function(){
      var k = oInput.value.trim();
      if(!k){ oShow('err','Paste your OMDb key first.'); return; }
      oSave.disabled = true;
      oShow('ok','Verifying with OMDb…');
      fetch('https://www.omdbapi.com/?apikey=' + encodeURIComponent(k) + '&i=tt0111161')
        .then(function(r){ return r.json(); })
        .then(function(d){
          if(d && d.Response === 'True'){
            if(!saveOmdbKey(k)) throw new Error('STORE');
            omdbKey = k;
            oShow('ok','Verified. RT / IMDb / Metacritic will appear on detail pages.');
            oInput.value = '';
            oSave.disabled = false;
          }else{ throw new Error('BAD'); }
        })
        .catch(function(e){
          oSave.disabled = false;
          oShow('err', (e && e.message==='STORE') ? 'Could not write to localStorage.' : 'OMDb rejected that key. Double-check it (activation email link clicked?).');
        });
    });
    on(oInput, 'keydown', function(e){ if(e.key === 'Enter') oSave.click(); });

    if(omdbKey){
      var oRow = el('div','row');
      var oClear = el('button','ghost-btn','Clear OMDb key');
      oClear.dataset.armed = '';
      on(oClear, 'click', function(){
        if(oClear.dataset.armed !== '1'){
          oClear.dataset.armed = '1';
          oClear.textContent = 'Tap again to clear';
          return;
        }
        clearOmdbKey();
        notice('OMDb key cleared.');
        renderSetup(true);
      });
      oRow.appendChild(oClear);
      box.appendChild(oRow);
    }
  }

  app.appendChild(box);
  app.appendChild(footer());
}

function doExport(){
  try{
    var blob = new Blob([JSON.stringify(lib, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = el('a'); a.href = url; a.download = 'screening-room-backup.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    notice('Exported ' + lib.length + ' titles.');
  }catch(e){ notice('Export failed.'); }
}
function doImport(file){
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error('shape');
      var valid = data.filter(function(e){
        return e && typeof e === 'object' && e.id != null &&
               (e.type === 'movie' || e.type === 'tv') && typeof e.title === 'string';
      });
      if(!valid.length) throw new Error('shape');
      lib = valid;
      saveLib();
      notice('Imported ' + lib.length + ' titles.');
      renderHome();
    }catch(e){ notice('That file was not a valid Screening Room backup.'); }
  };
  reader.onerror = function(){ notice('Could not read that file.'); };
  reader.readAsText(file);
}

/* ========================================================= */
/* HEADER                                                    */
/* ========================================================= */
/* history-aware navigation: detail/settings/stats push a state so the
   Android back button (and browser back) returns home instead of exiting */
var navDepth = 0;
function pushNav(){ try{ history.pushState({sr:1}, ''); navDepth++; }catch(e){} }
function goHomeNow(){
  if(!cred){ renderSetup(false); return; }
  state.view = 'home'; state.detail = null; window.scrollTo(0,0); rerender();
}
function goHome(){
  if(navDepth > 0){ history.back(); }
  else{ goHomeNow(); }
}
window.addEventListener('popstate', function(){
  if(navDepth > 0) navDepth--;
  if(state.view !== 'home') goHomeNow();
});

function renderHeader(withGear){
  var header = el('header');
  var h1 = el('h1', null, 'Screening Room');
  if(cred){
    h1.style.cursor = 'pointer';
    h1.setAttribute('role','button');
    h1.setAttribute('tabindex','0');
    h1.title = 'Home';
    on(h1, 'click', goHome);
    on(h1, 'keydown', function(e){ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); goHome(); } });
  }
  header.appendChild(h1);
  header.appendChild(el('div','now', "Now Showing · Chris's Watchlist"));
  header.appendChild(el('div','rule'));
  if(withGear){
    var gear = el('button','gear','⚙');
    gear.title = 'Settings';
    gear.setAttribute('aria-label','Settings');
    on(gear, 'click', function(){ pushNav(); renderSetup(true); });
    header.appendChild(gear);
  }
  app.appendChild(header);
  return header;
}
function footer(){
  var f = el('footer', null, 'Screening Room · Your reel, your rules');
  f.appendChild(el('div','ver', APP_VERSION));
  return f;
}

/* ========================================================= */
/* SEARCH                                                    */
/* ========================================================= */
var searchTimer = null;
function renderSearch(){
  var bar = el('div','searchbar');
  var input = el('input');
  input.type = 'search';
  input.placeholder = 'Search any movie or show… (TMDB)';
  input.setAttribute('aria-label','Search movies and shows');
  bar.appendChild(input);
  var btn = el('button', null, 'Add');
  bar.appendChild(btn);
  app.appendChild(bar);

  var panel = el('div');
  app.appendChild(panel);

  function runSearch(){
    var q = input.value.trim();
    if(!q){ clear(panel); return; }
    clear(panel);
    var loading = el('div','results');
    var l = el('div','loading'); l.appendChild(el('div','spinner')); l.appendChild(document.createTextNode('Searching…'));
    loading.appendChild(l);
    panel.appendChild(loading);
    tmdb('/search/multi', {query:q, include_adult:false}).then(function(data){
      clear(panel);
      var results = (data.results || []).filter(function(r){ return r.media_type==='movie' || r.media_type==='tv'; });
      if(!results.length){
        var none = el('div','results'); none.appendChild(el('div','loading','No matches. Try another title.'));
        panel.appendChild(none);
        return;
      }
      var box = el('div','results');
      results.slice(0,12).forEach(function(r){ box.appendChild(searchResultRow(r, panel, input)); });
      panel.appendChild(box);
    }).catch(function(e){
      clear(panel);
      var err = el('div','results'); err.appendChild(el('div','loading', errMessage(e)));
      panel.appendChild(err);
    });
  }

  on(btn, 'click', runSearch);
  on(input, 'keydown', function(e){ if(e.key==='Enter') runSearch(); });
  on(input, 'input', function(){
    if(searchTimer) clearTimeout(searchTimer);
    if(!input.value.trim()){ clear(panel); return; }
    searchTimer = setTimeout(runSearch, 400);
  });
}

function searchResultRow(r, panel, input){
  var isTv = r.media_type === 'tv';
  var title = isTv ? (r.name || r.original_name) : (r.title || r.original_title);
  var dateStr = isTv ? r.first_air_date : r.release_date;
  var year = dateStr ? dateStr.slice(0,4) : '—';
  var row = el('div','result');
  var pm = el('div','poster-mini');
  posterStyle(pm, r.poster_path, title);
  row.appendChild(pm);
  var mid = el('div');
  mid.appendChild(el('div','r-title', title));
  var metaStr = (isTv?'TV':'Movie') + ' · ' + year;
  var sc = scoreText(r.vote_average);
  if(sc) metaStr += ' · ' + sc;
  mid.appendChild(el('div','r-meta', metaStr));
  row.appendChild(mid);
  on(row, 'click', function(){
    openAddFlow({
      id: r.id, type: isTv?'tv':'movie', title:title, year:year, posterPath:r.poster_path||null, tmdbScore: r.vote_average||0,
      releaseDate: dateStr || null
    }, panel, input);
  });
  return row;
}

function openAddFlow(base, panel, input){
  var existing = findEntry(base.type, base.id);
  if(existing){ notice('"'+base.title+'" is already in your library.'); return; }
  clear(panel);
  var box = el('div','results');
  var wrap = el('div','addflow');

  var head = el('div','addflow-head');
  var pm = el('div','poster-mini'); posterStyle(pm, base.posterPath, base.title); head.appendChild(pm);
  var mid = el('div'); mid.style.minWidth = '0';
  mid.appendChild(el('div','r-title', base.title));
  mid.appendChild(el('div','r-meta', (base.type==='tv'?'TV':'Movie') + (base.year?(' · '+base.year):'')));
  head.appendChild(mid);
  wrap.appendChild(head);

  // optional tag picker sits above the status buttons — tag first, then file it.
  // tags chosen here are applied the moment a status button is tapped
  var selectedTags = [];
  var tagWrap = el('div','addflow-tags');
  tagWrap.appendChild(el('div','addflow-q', 'Tag it (optional)'));

    {status:'finished', cls:'finished', label:'Already finished', sub:'Rate & review it now'}
  ];
  choices.forEach(function(c){

function addTitle(base, status, panel, input, tags){
  var entry = {
    id: base.id, type: base.type, title: base.title, year: base.year, posterPath: base.posterPath,
    status: status, tags: (tags||[]).slice(),
    seasons: base.type==='tv' ? [] : undefined,
    watched: base.type==='tv' ? {} : undefined,
    epRatings: base.type==='tv' ? {} : undefined,
    rating: 0, review: '', recommend: null,
    tmdbScore: base.tmdbScore || 0,
    releaseDate: base.releaseDate || null,
    providers: {stream:[],rent:[],buy:[]}, providersCheckedAt: 0,
    addedAt: Date.now(), finishedAt: status==='finished' ? Date.now() : null
  };
  lib.push(entry);
  saveLib();
  if(panel) clear(panel);
  if(input) input.value = '';

  // background hydrate metadata + providers
  hydrateEntry(entry).then(function(){ if(state.view==='home' || (state.view==='detail' && state.detail && state.detail.id===entry.id)) safeRerender(); });

  if(status === 'finished'){
    state.view = 'detail'; state.detail = {type:entry.type, id:entry.id};
    rerender();
    notice('Added — rate it below.');
  }else{
    state.tab = status;
    rerender();
    notice('Added to ' + statusLabel(status) + '.');
  }
}

/* ========================================================= */
/* METADATA HYDRATION                                        */
/* ========================================================= */
function hydrateEntry(entry){
  var jobs = [];
  // seasons for tv
  if(entry.type === 'tv' && (!entry.seasons || !entry.seasons.length || !entry.releaseDate || !entry.genres)){
    jobs.push(tmdb('/tv/'+entry.id).then(function(d){
      if(!entry.seasons || !entry.seasons.length){
        entry.seasons = (d.seasons||[]).filter(function(s){ return s.season_number !== 0; })
          .map(function(s){ return {n:s.season_number, name:s.name, episodeCount:s.episode_count||0, episodes:null}; });
      }
      if(!entry.year && d.first_air_date) entry.year = d.first_air_date.slice(0,4);
      if(!entry.releaseDate && d.first_air_date) entry.releaseDate = d.first_air_date;
      if(d.vote_average) entry.tmdbScore = d.vote_average;
      entry.genres = (d.genres||[]).slice(0,3).map(function(g){ return g.name; });
      if(d.created_by && d.created_by.length) entry.director = d.created_by[0].name;
    }).catch(function(){}));
  }else if(entry.type === 'movie' && (!metaCache[entryKey('movie',entry.id)] || !entry.tmdbScore || !entry.releaseDate || !entry.genres)){
    jobs.push(tmdb('/movie/'+entry.id, {append_to_response:'credits'}).then(function(d){
      metaCache[entryKey('movie',entry.id)] = {runtime:d.runtime||0, tagline:d.tagline||''};
      saveMeta();
      if(!entry.releaseDate && d.release_date) entry.releaseDate = d.release_date;
      if(d.vote_average) entry.tmdbScore = d.vote_average;
      entry.genres = (d.genres||[]).slice(0,3).map(function(g){ return g.name; });
      var dir = d.credits && (d.credits.crew||[]).filter(function(c){ return c.job==='Director'; })[0];
      if(dir) entry.director = dir.name;
    }).catch(function(){}));
  }
  jobs.push(maybeRefreshProviders(entry));
  return Promise.all(jobs).then(function(){ saveLib(); });
}

function maybeRefreshProviders(entry, force){
  var now = Date.now();
  if(!force && entry.providersCheckedAt && (now - entry.providersCheckedAt) < PROVIDER_TTL){
    return Promise.resolve();
  }
  return tmdb('/'+entry.type+'/'+entry.id+'/watch/providers').then(function(d){
    var us = (d.results && d.results.US) || {};
    function names(arr){ return (arr||[]).map(function(p){ return p.provider_name; }); }
    var hadStream = !!(entry.providers && entry.providers.stream && entry.providers.stream.length);
    entry.providers = { stream: names(us.flatrate), rent: names(us.rent), buy: names(us.buy) };
    // a title just landed on a streaming service — flag it so the UI can celebrate
    if(!hadStream && entry.providers.stream.length && entry.providersCheckedAt){
      entry.streamNewAt = now;
    }
    entry.providersCheckedAt = now;
    saveLib();
  }).catch(function(){ /* leave stale providers in place */ });
}

var TRAILER_TTL = 7 * 24 * 60 * 60 * 1000;
function fetchTrailer(entry){
  if(entry.trailerKey) return Promise.resolve();
  if(entry.trailerCheckedAt && (Date.now() - entry.trailerCheckedAt) < TRAILER_TTL) return Promise.resolve();
  return tmdb('/'+entry.type+'/'+entry.id+'/videos').then(function(d){
    var vids = (d.results||[]).filter(function(v){ return v.site==='YouTube' && v.key && (v.type==='Trailer' || v.type==='Teaser'); });
    vids.sort(function(a,b){
      // prefer official Trailer > Teaser, then the most recently published
      // (multi-season shows list every season's trailer here — newest wins,
      // so a returning show points at its latest season, not season 1)
      return ((b.type==='Trailer')-(a.type==='Trailer'))
        || ((b.official===true)-(a.official===true))
        || (new Date(b.published_at||0) - new Date(a.published_at||0));
    });
    if(vids.length) entry.trailerKey = vids[0].key;
    entry.trailerCheckedAt = Date.now();
    saveLib();
  }).catch(function(){});
}

var OMDB_TTL = 7 * 24 * 60 * 60 * 1000;
function fetchOmdb(entry){
  if(!omdbKey) return Promise.resolve();
  if(entry.omdb && entry.omdb.checkedAt && (Date.now() - entry.omdb.checkedAt) < OMDB_TTL) return Promise.resolve();
  var idJob = (entry.omdb && entry.omdb.imdbId)
    ? Promise.resolve(entry.omdb.imdbId)
    : tmdb('/'+entry.type+'/'+entry.id+'/external_ids').then(function(d){ return d.imdb_id || null; });
  return idJob.then(function(imdbId){
    if(!imdbId) return;
    return fetch('https://www.omdbapi.com/?apikey=' + encodeURIComponent(omdbKey) + '&i=' + encodeURIComponent(imdbId))
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(!d || d.Response !== 'True') return;
        var out = {imdbId: imdbId, checkedAt: Date.now(), imdb: null, rt: null, mc: null};
        (d.Ratings || []).forEach(function(rt){
          if(rt.Source === 'Internet Movie Database'){ out.imdb = (rt.Value||'').split('/')[0]; }
          else if(rt.Source === 'Rotten Tomatoes'){ out.rt = rt.Value || null; }
          else if(rt.Source === 'Metacritic'){ out.mc = (rt.Value||'').split('/')[0]; }
        });
        entry.omdb = out;
        saveLib();
      });
  }).catch(function(){ /* scores are a bonus — fail silently */ });
}

function loadSeasonEpisodes(entry, season){
  return tmdb('/tv/'+entry.id+'/season/'+season.n).then(function(d){
    season.episodes = (d.episodes||[]).map(function(ep){ return {n:ep.episode_number, name:ep.name||('Episode '+ep.episode_number), score:ep.vote_average||0}; });
    if(!season.episodeCount) season.episodeCount = season.episodes.length;
    saveLib();
    return season.episodes;
  });
}

/* refresh providers for everything (called on app open), then rerender once */
function refreshAllProviders(){
  var due = lib.filter(function(e){ return !e.providersCheckedAt || (Date.now()-e.providersCheckedAt) >= PROVIDER_TTL; });
  // backfill release dates for Waiting titles added before releaseDate existed
  var needDate = lib.filter(function(e){ return e.status==='wishlist' && !e.releaseDate; });
  var jobs = due.map(function(e){ return maybeRefreshProviders(e); })
    .concat(needDate.map(function(e){ return hydrateEntry(e); }));
  if(!jobs.length) return;
  Promise.all(jobs).then(function(){
    if(state.view==='home' || state.view==='detail') safeRerender();
  });
}

/* ========================================================= */
/* PROGRESS HELPERS (tv)                                     */
/* ========================================================= */
function totalEpisodes(entry){
  var t = 0;
  (entry.seasons||[]).forEach(function(s){ t += (s.episodeCount||0); });
  return t;
}
function watchedCount(entry){
  var w = entry.watched || {}; var c = 0;
  for(var k in w){ if(w[k]) c++; }
  return c;
}
function seasonWatchedCount(entry, season){
  var w = entry.watched||{}; var c=0;
  for(var i=1;i<=(season.episodeCount||0);i++){ if(w['s'+season.n+'e'+i]) c++; }
  return c;
}
function progressPct(entry){
  var t = totalEpisodes(entry);
  if(!t) return 0;
  return Math.round(watchedCount(entry)/t*100);
}
function nextUnwatched(entry){
  var w = entry.watched||{};
  var seasons = (entry.seasons||[]).slice().sort(function(a,b){ return a.n-b.n; });
  for(var i=0;i<seasons.length;i++){
    var s = seasons[i];
    for(var e=1;e<=(s.episodeCount||0);e++){
      if(!w['s'+s.n+'e'+e]){
        var name = null;
        if(s.episodes){ for(var j=0;j<s.episodes.length;j++){ if(s.episodes[j].n===e){ name=s.episodes[j].name; break; } } }
        return {season:s.n, ep:e, name:name};
      }
    }
  }
  return null; // fully watched
}
function pad2(n){ return (n<10?'0':'')+n; }

/* rerender for background data arrivals — skipped if the user is mid-typing
   (search box, review textarea, key field) so their draft isn't wiped */
function safeRerender(){

}
function rerender(){

}

function providerChips(entry, which, limit){
  var p = entry.providers || {};
  var list = [];
  if(which==='stream' || which==='all'){ (p.stream||[]).forEach(function(n){ list.push({n:n,cls:'stream',label:'Stream'}); }); }
  if(which==='all'){
    (p.rent||[]).forEach(function(n){ list.push({n:n,cls:'rent',label:'Rent'}); });
    (p.buy||[]).forEach(function(n){ list.push({n:n,cls:'rent',label:'Buy'}); });
  }
  if(!list.length) return null;
  if(limit) list = list.slice(0, limit);
  var wrap = el('div','providers');
  list.forEach(function(item){
    var chip = el('a','chip '+item.cls, item.n + ' · ' + item.label);
    chip.href = 'https://www.themoviedb.org/'+entry.type+'/'+entry.id+'/watch?locale=US';
    chip.target = '_blank'; chip.rel = 'noopener';
    on(chip, 'click', function(ev){ ev.stopPropagation(); });
    wrap.appendChild(chip);
  });
  return wrap;
}

function statusLabel(s){
  if(s === 'wishlist') return 'Waiting';
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function scoreText(v){
  v = Number(v);
  if(!v || v <= 0) return null;
  return 'TMDB ★ ' + (Math.round(v*10)/10).toFixed(1);
}
function starsStr(r){
  r = Math.max(0, Math.min(5, Number(r)||0));
  var full = Math.floor(r), half = (r % 1) >= 0.5;
  return '★★★★★'.slice(0, full) + (half ? '½' : '') + '☆☆☆☆☆'.slice(0, 5 - full - (half ? 1 : 0));
}
function fmtDate(iso){
  try{
    var d = new Date(iso + 'T00:00:00');
    if(isNaN(d.getTime())) return null;
    return d.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
  }catch(e){ return null; }
}
function fmtDateTs(ts){
  try{
    var d = new Date(ts);
    if(isNaN(d.getTime())) return null;
    return d.toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
  }catch(e){ return null; }
}
function releaseLabel(entry){
  if(entry.releaseDate){
    var f = fmtDate(entry.releaseDate);
    if(f){
      var when = new Date(entry.releaseDate + 'T00:00:00');
      if(when > new Date()){
        var days = Math.ceil((when - new Date()) / 864e5);
        if(days === 1) return 'Coming tomorrow';
        if(days <= 120) return 'Coming in ' + days + ' days';
        return 'Coming ' + f;
      }
      return 'Released ' + f;
    }
  }
  if(entry.year) return 'Released ' + entry.year;
  return 'Not streaming yet';
}
function isLikelyInTheaters(entry){
  if(entry.type !== 'movie' || !entry.releaseDate) return false;
  var hasProviders = entry.providers && (
    (entry.providers.stream && entry.providers.stream.length) ||
    (entry.providers.rent && entry.providers.rent.length) ||
    (entry.providers.buy && entry.providers.buy.length)
  );
  if(hasProviders) return false;
  var days = Math.floor((new Date() - new Date(entry.releaseDate+'T00:00:00')) / 864e5);
  // already released (within the theatrical window) OR releasing soon enough that
  // theaters have likely posted showtimes/presale tickets
  return (days >= 0 && days <= THEATRICAL_WINDOW_DAYS) || (days < 0 && -days <= PRE_RELEASE_SHOWTIME_DAYS);
}
function theaterSearchUrl(title){
  return 'https://www.google.com/search?q=' + encodeURIComponent(title + ' showtimes near me');
}
function renderTabs(){
  var counts = {watching:0, wishlist:0, finished:0};
  lib.forEach(function(e){ if(counts[e.status]!=null) counts[e.status]++; });
  var tabs = el('div','tabs');
  [['watching','Watching'],['wishlist','Waiting'],['finished','Finished']].forEach(function(t){
    var b = el('button','tab' + (state.tab===t[0]?' active':''));
    b.appendChild(document.createTextNode(t[1]));
    b.appendChild(el('span','count', String(counts[t[0]])));
    on(b, 'click', function(){ state.tab = t[0]; state.tagFilter = null; rerender(); });
    tabs.appendChild(b);
  });
  app.appendChild(tabs);
}

function renderPane(){
  var items = lib.filter(function(e){ return e.status === state.tab; });
  if(!items.length){ app.appendChild(emptyState(state.tab)); return; }

  var tagBar = tagFilterBar(items);

  if(state.tab === 'finished'){
    app.appendChild(finishedSortBar());
    if(tagBar) app.appendChild(tagBar);
    if(state.tagFilter){ items = items.filter(function(e){ return entryHasTag(e, state.tagFilter); }); }
    if(state.finRec){ items = items.filter(function(e){ return e.recommend === true; }); }
    if(state.finSort === 'top'){
      items.sort(function(a,b){ return (b.rating||0)-(a.rating||0) || (b.finishedAt||0)-(a.finishedAt||0); });
    }else if(state.finSort === 'az'){
      items.sort(function(a,b){ return (a.title||'').localeCompare(b.title||''); });
    }else{
      items.sort(function(a,b){ return (b.finishedAt||0)-(a.finishedAt||0); });
    }
    if(!items.length){
      if(state.finRec && !state.tagFilter){
        var e2 = el('div','empty');
        e2.appendChild(el('b', null, 'No recommended tickets yet.'));
        e2.appendChild(el('div','', 'Turn a review’s Recommend toggle on and it will show up here.'));
        app.appendChild(e2);
      }else{
        app.appendChild(filteredEmpty());
      }
      return;
    }
    items.forEach(function(e){ app.appendChild(ticketCard(e)); });
    app.appendChild(listShareBtn(items));
    return;
  }

  if(tagBar) app.appendChild(tagBar);
  if(state.tagFilter){ items = items.filter(function(e){ return entryHasTag(e, state.tagFilter); }); }

  if(state.tab === 'wishlist'){
    // upcoming releases first (soonest on top), everything else by recently added
    var today = new Date();
    items.sort(function(a,b){
      var fa = !!(a.releaseDate && new Date(a.releaseDate+'T00:00:00') > today);
      var fb = !!(b.releaseDate && new Date(b.releaseDate+'T00:00:00') > today);
      if(fa !== fb) return fa ? -1 : 1;
      if(fa && fb) return a.releaseDate.localeCompare(b.releaseDate);
      return (b.addedAt||0)-(a.addedAt||0);
    });
  }

  if(!items.length){ app.appendChild(filteredEmpty()); return; }

  var grid = el('div','grid');
  items.forEach(function(e){ grid.appendChild(titleCard(e)); });
  app.appendChild(grid);
  app.appendChild(listShareBtn(items));
}

function tagFilterBar(items){
  var used = {};
  items.forEach(function(e){ (e.tags||[]).forEach(function(t){ used[t]=true; }); });
  var tags = Object.keys(used).sort(function(a,b){
    var ai = DEFAULT_TAGS.indexOf(a); if(ai===-1) ai = 999;
    var bi = DEFAULT_TAGS.indexOf(b); if(bi===-1) bi = 999;
    if(ai !== bi) return ai - bi;
    return a.localeCompare(b);
  });
  if(!tags.length) return null;
  var bar = el('div','sortbar');
  tags.forEach(function(tag){
    var b = el('button','sort-chip' + (state.tagFilter===tag?' active':''), tag);
    on(b, 'click', function(){ state.tagFilter = (state.tagFilter===tag) ? null : tag; rerender(); });
    bar.appendChild(b);
  });
  return bar;
}

function filteredEmpty(){
  var e = el('div','empty');
  e.appendChild(el('b', null, 'No titles match this filter.'));
  e.appendChild(el('div','', 'Try a different tag, or clear the filter above.'));

}

function finishedSortBar(){

function titleCard(entry){
  var card = el('div','title-card');
  var poster = el('div','poster'); posterStyle(poster, entry.posterPath, entry.title); card.appendChild(poster);
  var meta = el('div','meta');

  if(entry.type==='tv'){
    var pct = progressPct(entry);
    var seasonsN = (entry.seasons||[]).length;
    var kind = el('span','kind', 'TV' + (seasonsN?(' · '+seasonsN+' Season'+(seasonsN>1?'s':'')):''));
    meta.appendChild(kind);
    if(entry.status==='watching'){
      meta.appendChild(el('span','pct', pct+'%'));
      var bar = el('div','bar'); var i = el('i'); i.style.width = pct+'%'; bar.appendChild(i); meta.appendChild(bar);
    }
  }else{
    meta.appendChild(el('span','kind', 'Movie · ' + (entry.year||'')));
  }

  // wishlist: show live providers
  if(entry.status==='wishlist'){
    if(entry.streamNewAt && (Date.now()-entry.streamNewAt) < 7*864e5 && (entry.providers && entry.providers.stream || []).length){

    else{ var none = el('div','kind'); none.style.marginTop='8px'; none.textContent=releaseLabel(entry); meta.appendChild(none); }

    entry.tags.forEach(function(t){ tagsRow.appendChild(el('span','chip tag', t)); });
    meta.appendChild(tagsRow);

  // no action buttons on the card itself — tap the poster to open the detail,
  // where status changes, rating, and remove live.
  card.appendChild(meta);
  on(card, 'click', function(){ openDetail(entry); });
  return card;
}

/* ---------- shareable ticket image ---------- */
function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}
function wrapText(ctx, text, maxWidth, maxLines){
  var words = (text||'').split(/\s+/), lines = [], cur = '';
  for(var i=0;i<words.length;i++){
    var test = cur ? cur+' '+words[i] : words[i];
    if(cur && ctx.measureText(test).width > maxWidth){ lines.push(cur); cur = words[i]; }
    else cur = test;
    if(maxLines && lines.length >= maxLines){ break; }
  }
  if(cur && (!maxLines || lines.length < maxLines)) lines.push(cur);
  if(maxLines && lines.length >= maxLines){
    var last = lines[maxLines-1];
    while(last.length && ctx.measureText(last+'…').width > maxWidth){ last = last.slice(0,-1); }
    lines[maxLines-1] = last.replace(/[\s]+$/,'') + '…';
  }
  return lines;
}
function setLS(ctx, v){ try{ ctx.letterSpacing = v; }catch(e){} }

function drawTicket(entry){
  var S = 2;                       // supersample for crispness
  var W = 560, M = 16, stubW = 84, padX = 26, padY = 28;
  var bodyX = M + stubW + padX, bodyRight = W - M - padX, bodyW = bodyRight - bodyX;
  var scratch = document.createElement('canvas').getContext('2d');

  var recText = entry.recommend===true ? 'RECOMMENDED' : (entry.recommend===false ? 'SKIP IT' : '');
  var stampReserve = 0;
  if(recText){
    scratch.font = '700 12px "Libre Franklin", sans-serif';
    stampReserve = scratch.measureText(recText).width + 46; // stamp padding + ring + gap from title
  }

  var titleText = (entry.title||'').toUpperCase();
  var titleSize = 30;
  scratch.font = '800 ' + titleSize + 'px Archivo, sans-serif';
  while(titleSize > 20 && scratch.measureText(titleText).width > bodyW){
    titleSize -= 1; scratch.font = '800 ' + titleSize + 'px Archivo, sans-serif';
  }
  // wrap (not just shrink) so a long title flows around the stamp instead of
  // overflowing the card — all lines use the stamp-reserved width for safety
  var titleLines = wrapText(scratch, titleText, bodyW - stampReserve, 2);
  var titleLH = Math.round(titleSize * 1.15);

  var reviewText = entry.review ? ('“' + entry.review + '”') : 'No note left — the stars say enough.';
  scratch.font = '400 20px "Libre Franklin", sans-serif';
  var reviewLines = wrapText(scratch, reviewText, bodyW, 10);
  var reviewLH = 28;

  // vertical layout in the body
  var y = M + padY;
  var titleBase = y + titleSize; y = titleBase + (titleLines.length-1)*titleLH + 16;
  var reviewTop = y; y += reviewLines.length * reviewLH + 12;
  var yearBase = y + 12; y = yearBase + padY + M;
  var H = Math.max(Math.round(y), M + 210 + M);

  var canvas = document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  var ctx = canvas.getContext('2d');
  ctx.scale(S,S);

  // velvet backdrop + warm glow
  ctx.fillStyle = '#1C1414'; ctx.fillRect(0,0,W,H);
  var glow = ctx.createRadialGradient(W/2,-30,0, W/2,-30,W*0.75);
  glow.addColorStop(0,'rgba(46,32,24,0.85)'); glow.addColorStop(1,'rgba(28,20,20,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);

  var cardX=M, cardY=M, cardW=W-2*M, cardH=H-2*M, r=16;
  roundRect(ctx, cardX, cardY, cardW, cardH, r);
  ctx.fillStyle='#261C1A'; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle='#453430'; ctx.stroke();

  // red stub, clipped to the card so its left corners match
  ctx.save();
  roundRect(ctx, cardX, cardY, cardW, cardH, r); ctx.clip();
  ctx.fillStyle='#B5483C'; ctx.fillRect(cardX, cardY, stubW, cardH);
  ctx.restore();

  var seamX = cardX + stubW;
  ctx.save();
  ctx.strokeStyle='#1C1414'; ctx.lineWidth=2; ctx.setLineDash([4,7]);
  ctx.beginPath(); ctx.moveTo(seamX, cardY+8); ctx.lineTo(seamX, cardY+cardH-8); ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#1C1414';
  ctx.beginPath(); ctx.arc(seamX, cardY, 10, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(seamX, cardY+cardH, 10, 0, Math.PI*2); ctx.fill();

  // stub: vertical ADMIT ONE + star rating
  ctx.save();
  ctx.translate(cardX + stubW/2, cardY + cardH/2);
  ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(243,233,215,0.9)'; ctx.font='700 12px "Libre Franklin", sans-serif';
  var stubLabel = 'ADMIT ONE';
  if(entry.finishedAt){
    var sd = fmtDateTs(entry.finishedAt);
    if(sd) stubLabel += ' · ' + sd.toUpperCase();
  }
  // shrink letter-spacing if the dated label would overflow the stub height
  var stubLS = (stubLabel.length > 12 && cardH < 300) ? '1px' : '3px';
  setLS(ctx, stubLS); ctx.fillText(stubLabel, 0, -18); setLS(ctx,'0px');
  var rN = Math.max(0, Math.min(5, entry.rating||0));
  var rFull = Math.floor(rN), rHalf = (rN % 1) >= 0.5;
  ctx.font='27px sans-serif'; setLS(ctx,'0px');
  var sgap = 29;
  for(var s=0;s<5;s++){
    var glyph, gold;
    if(s < rFull){ glyph='★'; gold=true; }
    else if(s === rFull && rHalf){ glyph='½'; gold=true; }
    else { glyph='☆'; gold=false; }
    ctx.fillStyle = gold ? '#F5D98A' : 'rgba(245,217,138,0.38)';
    ctx.fillText(glyph, (s-2)*sgap, 14);
  }
  ctx.restore();

  // body: title (may wrap onto a second line to flow around the stamp)
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='#D9A441'; ctx.font='800 ' + titleSize + 'px Archivo, sans-serif';
  setLS(ctx,'0.5px');
  titleLines.forEach(function(line, idx){ ctx.fillText(line, bodyX, titleBase + idx*titleLH); });
  setLS(ctx,'0px');

  // recommend / skip — rotated ink-stamp in the top-right corner
  if(recText){
    ctx.save();
    ctx.font='700 12px "Libre Franklin", sans-serif';
    setLS(ctx,'2px');
    var stTextW = ctx.measureText(recText).width;
    var stampPadX = 11, stampW = stTextW + stampPadX*2, stampH = 30;
    var stampCX = bodyRight - stampW/2 - 6;
    var stampCY = titleBase - titleSize*0.42;
    ctx.translate(stampCX, stampCY);
    ctx.rotate(-9 * Math.PI/180);
    var isRec = entry.recommend===true;
    var ink = isRec ? '#7BAF8C' : '#B5483C';
    roundRect(ctx, -stampW/2-4, -stampH/2-4, stampW+8, stampH+8, 10);
    ctx.lineWidth=1; ctx.globalAlpha=0.4; ctx.strokeStyle=ink; ctx.stroke(); ctx.globalAlpha=1;
    roundRect(ctx, -stampW/2, -stampH/2, stampW, stampH, 8);
    ctx.lineWidth=2; ctx.strokeStyle=ink; ctx.stroke();
    ctx.fillStyle=ink; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(recText, 0, 1);
    ctx.restore();
    setLS(ctx,'0px'); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }

  // review
  ctx.fillStyle='#A08D7E'; ctx.font='400 20px "Libre Franklin", sans-serif';
  var ry = reviewTop + 18;
  reviewLines.forEach(function(line){ ctx.fillText(line, bodyX, ry); ry += reviewLH; });

  // meta + brand footer
  var metaParts = [entry.type==='tv'?'TV':'MOVIE'];
  if(entry.year) metaParts.push(String(entry.year));
  if(entry.type==='tv'){ var sn = (entry.seasons||[]).length; if(sn) metaParts.push(sn + ' SEASON' + (sn>1?'S':'')); }
  var dwc = 1 + ((entry.history && entry.history.length) || 0);
  if(dwc > 1) metaParts.push(dwc + '× WATCHED');
  ctx.fillStyle='#A08D7E'; ctx.font='700 11px "Libre Franklin", sans-serif';
  setLS(ctx,'1.5px');
  ctx.fillText(metaParts.join('  ·  '), bodyX, yearBase);
  ctx.fillStyle='rgba(217,164,65,0.8)'; ctx.textAlign='right';
  ctx.fillText('ORTIZZLE SCREENING ROOM', bodyRight, cardY+cardH-16);
  ctx.textAlign='left'; setLS(ctx,'0px');

  return canvas;
}
function buildTicketCanvas(entry){
  var jobs = [];
  if(document.fonts){
    if(document.fonts.ready) jobs.push(document.fonts.ready);
    if(document.fonts.load){
      try{
        jobs.push(document.fonts.load('800 30px Archivo'));
        jobs.push(document.fonts.load('700 12px "Libre Franklin"'));
        jobs.push(document.fonts.load('400 20px "Libre Franklin"'));
      }catch(e){}
    }
  }
  return Promise.all(jobs).catch(function(){}).then(function(){ return drawTicket(entry); });
}
function ticketShareText(entry){
  var stars = starsStr(entry.rating);
  var lines = [entry.title + '  ' + stars];
  if(entry.review) lines.push('“' + entry.review + '”');
  if(entry.recommend===true) lines.push('👍 Recommended');
  else if(entry.recommend===false) lines.push('👎 Skip it');
  lines.push('— Ortizzle Screening Room');
  return lines.join('\n');
}
function ticketFileName(entry){
  var slug = (entry.title||'ticket').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'').toLowerCase();
  return (slug||'ticket') + '-ticket.png';
}
function downloadBlob(blob, name){
  try{
    var url = URL.createObjectURL(blob);
    var a = el('a'); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }catch(e){}
}
function shareTicket(entry, btn){
  if(btn){ btn.disabled = true; }
  buildTicketCanvas(entry).then(function(canvas){
    canvas.toBlob(function(blob){
      if(btn){ btn.disabled = false; }
      if(!blob){ notice('Could not render the ticket image.'); return; }
      var name = ticketFileName(entry);
      var text = ticketShareText(entry);
      var file = null;
      try{ file = new File([blob], name, {type:'image/png'}); }catch(e){}
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], text:text}).catch(function(err){
          if(!err || err.name !== 'AbortError'){ downloadBlob(blob, name); }
        });
      }else if(navigator.share){
        navigator.share({text:text}).then(function(){ downloadBlob(blob, name); notice('Image saved to share alongside.'); })
          .catch(function(err){ if(!err || err.name !== 'AbortError'){ downloadBlob(blob, name); } });
      }else{
        downloadBlob(blob, name);
        notice('Ticket image saved to downloads.');
      }
    }, 'image/png');
  }).catch(function(){ if(btn){ btn.disabled = false; } notice('Could not create the ticket image.'); });
}

/* BOX OFFICE REPORT                                         */

function computeStats(){
  var year = new Date().getFullYear();
  var tickets = []; // every screening, incl. rewatch history
  lib.forEach(function(e){
    if(e.status==='finished') tickets.push({t: e.finishedAt || e.addedAt || 0});
    (e.history||[]).forEach(function(h){ if(h) tickets.push({t: h.finishedAt || 0}); });
  });
  var thisYear = tickets.filter(function(t){ return t.t && new Date(t.t).getFullYear() === year; }).length;
  var eps = 0;
  lib.forEach(function(e){ if(e.type==='tv') eps += watchedCount(e); });
  var mins = eps * 42; // est. minutes per episode
  lib.forEach(function(e){
    if(e.type==='movie'){
      var m = metaCache[entryKey('movie',e.id)];
      var run = (m && m.runtime) || 110;
      var plays = (e.status==='finished' ? 1 : 0) + ((e.history||[]).length);
      mins += run * plays;
    }
  });
  var rated = lib.filter(function(e){ return e.status==='finished' && e.rating>0; });
  var avg = rated.length ? Math.round(rated.reduce(function(a,e){ return a+e.rating; },0)/rated.length*10)/10 : 0;
  var fin = lib.filter(function(e){ return e.status==='finished'; });
  var rec = fin.filter(function(e){ return e.recommend===true; }).length;
  var byMonth = {};
  tickets.forEach(function(t){
    if(!t.t) return;
    var d = new Date(t.t);
    var k = d.toLocaleDateString(undefined, {month:'short', year:'numeric'});
    byMonth[k] = (byMonth[k]||0) + 1;
  });
  var bm = null, bn = 0;
  for(var k in byMonth){ if(byMonth[k] > bn){ bn = byMonth[k]; bm = k; } }
  return {
    year: year, thisYear: thisYear, allTime: tickets.length,
    episodes: eps, hours: Math.round(mins/60), avg: avg,
    recPct: fin.length ? Math.round(rec/fin.length*100) : 0,
    busiest: bm ? (bm + ' · ' + bn + (bn===1?' ticket':' tickets')) : null
  };
}

function drawReport(s){
  var S = 2, W = 560, M = 16, padX = 28;
  var headerH = 118, rowH = 96, rows = 3, footH = s.busiest ? 56 : 28;
  var H = M + headerH + rows*rowH + footH + M;
  var canvas = document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  var ctx = canvas.getContext('2d'); ctx.scale(S,S);

  ctx.fillStyle = '#1C1414'; ctx.fillRect(0,0,W,H);
  var glow = ctx.createRadialGradient(W/2,-30,0, W/2,-30,W*0.75);
  glow.addColorStop(0,'rgba(46,32,24,0.85)'); glow.addColorStop(1,'rgba(28,20,20,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);
  roundRect(ctx, M, M, W-2*M, H-2*M, 16);
  ctx.fillStyle = '#261C1A'; ctx.fill();
  ctx.lineWidth = 1; ctx.strokeStyle = '#453430'; ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#D9A441'; ctx.font = '800 30px Archivo, sans-serif';
  setLS(ctx,'1px'); ctx.fillText('BOX OFFICE REPORT', W/2, M+56); setLS(ctx,'0px');
  ctx.fillStyle = '#A08D7E'; ctx.font = '700 11px "Libre Franklin", sans-serif';
  setLS(ctx,'3px'); ctx.fillText(s.year + '  ·  ORTIZZLE SCREENING ROOM', W/2, M+82); setLS(ctx,'0px');
  var lg = ctx.createLinearGradient(M+padX,0,W-M-padX,0);
  lg.addColorStop(0,'#D9A441'); lg.addColorStop(1,'rgba(217,164,65,0)');
  ctx.fillStyle = lg; ctx.fillRect(M+padX, M+100, W-2*M-2*padX, 2);

  var stats = [
    [String(s.thisYear), 'TICKETS · ' + s.year],
    [String(s.allTime), 'TICKETS ALL-TIME'],
    [String(s.episodes), 'EPISODES WATCHED'],
    [String(s.hours), 'HOURS WATCHED (EST.)'],
    [s.avg ? ('★ ' + s.avg) : '—', 'AVERAGE RATING'],
    [s.recPct + '%', 'RECOMMENDED']
  ];
  var gridTop = M + headerH, colW = (W - 2*M) / 2;
  for(var i=0;i<stats.length;i++){
    var cx = M + colW*(i%2) + colW/2;
    var cy = gridTop + rowH*Math.floor(i/2);
    ctx.fillStyle = '#D9A441'; ctx.font = '800 34px Archivo, sans-serif';
    ctx.fillText(stats[i][0], cx, cy+44);
    ctx.fillStyle = '#A08D7E'; ctx.font = '700 10px "Libre Franklin", sans-serif';
    setLS(ctx,'1.5px'); ctx.fillText(stats[i][1], cx, cy+66); setLS(ctx,'0px');
  }
  if(s.busiest){

    setLS(ctx,'1.5px');

    setLS(ctx,'0px');
  }
  ctx.textAlign = 'left';
  return canvas;
}

function shareReport(btn, s){
  if(btn) btn.disabled = true;

function fitText(ctx, text, maxW){
  text = text || '';
  if(ctx.measureText(text).width <= maxW) return text;
  while(text.length && ctx.measureText(text+'…').width > maxW) text = text.slice(0,-1);
  return text.replace(/\s+$/,'') + '…';
}

function drawMarquee(items, heading, subtitle){

  ctx.fillStyle = '#1C1414'; ctx.fillRect(0,0,W,H);
  var glow = ctx.createRadialGradient(W/2,-30,0, W/2,-30,W*0.75);
  glow.addColorStop(0,'rgba(46,32,24,0.85)'); glow.addColorStop(1,'rgba(28,20,20,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,W,H);
  roundRect(ctx, M, M, W-2*M, H-2*M, 16);
  ctx.fillStyle = '#261C1A'; ctx.fill();
  ctx.lineWidth = 1; ctx.strokeStyle = '#453430'; ctx.stroke();

  // header
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(217,164,65,0.8)'; ctx.font = '700 10px "Libre Franklin", sans-serif';
  setLS(ctx,'3px'); ctx.fillText('ORTIZZLE SCREENING ROOM PRESENTS', W/2, M+34); setLS(ctx,'0px');
  ctx.fillStyle = '#D9A441'; ctx.font = '800 30px Archivo, sans-serif';
  setLS(ctx,'1px'); ctx.fillText(heading, W/2, M+72); setLS(ctx,'0px');
  ctx.fillStyle = '#A08D7E'; ctx.font = '700 11px "Libre Franklin", sans-serif';
  setLS(ctx,'2px'); ctx.fillText(subtitle, W/2, M+96); setLS(ctx,'0px');
  var lg = ctx.createLinearGradient(M+padX,0,W-M-padX,0);
  lg.addColorStop(0,'rgba(217,164,65,0)'); lg.addColorStop(0.5,'#D9A441'); lg.addColorStop(1,'rgba(217,164,65,0)');
  ctx.fillStyle = lg; ctx.fillRect(M+padX, M+112, W-2*M-2*padX, 2);

  // marquee lines
  ctx.textAlign = 'left';
  var idxX = M+padX, titleX = idxX+30, rightX = W-M-padX;
  var top = M + headerH;
  shown.forEach(function(e, i){
    var titleBase = top + i*rowH + 26;
    ctx.fillStyle = 'rgba(217,164,65,0.5)'; ctx.font = '800 12px Archivo, sans-serif';
    ctx.fillText(pad2(i+1), idxX, titleBase);
    var yearStr = e.year ? '  ·  '+e.year : '';
    ctx.font = '700 11px "Libre Franklin", sans-serif';
    var yearW = yearStr ? ctx.measureText(yearStr).width : 0;
    ctx.font = '800 19px Archivo, sans-serif';
    var t = fitText(ctx, (e.title||'').toUpperCase(), rightX - titleX - yearW);
    ctx.fillStyle = '#D9A441';
    ctx.fillText(t, titleX, titleBase);
    if(yearStr){
      var tw = ctx.measureText(t).width;
      ctx.fillStyle = '#A08D7E'; ctx.font = '700 11px "Libre Franklin", sans-serif';
      ctx.fillText(yearStr, titleX+tw, titleBase);
    }
    ctx.fillStyle = '#A08D7E'; ctx.font = '700 10px "Libre Franklin", sans-serif';
    setLS(ctx,'1.5px');
    ctx.fillText(fitText(ctx, listMetaLine(e), rightX - titleX), titleX, titleBase+19);
    setLS(ctx,'0px');
    if(i < shown.length-1){
      ctx.save();
      ctx.strokeStyle = 'rgba(69,52,48,0.7)'; ctx.lineWidth = 1; ctx.setLineDash([2,5]);
      ctx.beginPath(); ctx.moveTo(idxX, top+(i+1)*rowH-6); ctx.lineTo(rightX, top+(i+1)*rowH-6); ctx.stroke();
      ctx.restore();
    }
  });

  ctx.textAlign = 'center';
  if(extra > 0){
    ctx.fillStyle = '#A08D7E'; ctx.font = '700 10px "Libre Franklin", sans-serif';
    setLS(ctx,'1.5px'); ctx.fillText('+ ' + extra + ' MORE ON THE LIST', W/2, top + shown.length*rowH + 14); setLS(ctx,'0px');
  }
  var shareDate = new Date().toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'});
  ctx.fillStyle = 'rgba(160,141,126,0.8)'; ctx.font = '700 9px "Libre Franklin", sans-serif';
  setLS(ctx,'2px'); ctx.fillText('SHARED ' + shareDate.toUpperCase(), W/2, H-M-18); setLS(ctx,'0px');
  ctx.textAlign = 'left';
  return canvas;
}

function listShareText(items, heading){
  var lines = [heading + ' 🎟'];
  items.slice(0,12).forEach(function(e, i){
    lines.push((i+1)+'. '+e.title + (e.year ? ' ('+e.year+')' : ''));
  });
  if(items.length > 12) lines.push('…and ' + (items.length-12) + ' more');
  lines.push('— Ortizzle Screening Room');
  return lines.join('\n');
}

function shareList(items, btn){
  if(btn) btn.disabled = true;
  var heading = listShareTitle();
  var n = items.length;
  var subtitle = (state.tagFilter ? state.tagFilter.toUpperCase() + ' · ' : '') + n + (n===1 ? ' TITLE' : ' TITLES');
  var jobs = [];
  if(document.fonts && document.fonts.load){
    try{
      jobs.push(document.fonts.load('800 30px Archivo'));
      jobs.push(document.fonts.load('800 19px Archivo'));
      jobs.push(document.fonts.load('800 12px Archivo'));
      jobs.push(document.fonts.load('700 11px "Libre Franklin"'));
      jobs.push(document.fonts.load('700 10px "Libre Franklin"'));
    }catch(e){}
  }
  Promise.all(jobs).catch(function(){}).then(function(){
    var canvas = drawMarquee(items, heading, subtitle);
    canvas.toBlob(function(blob){
      if(btn) btn.disabled = false;
      if(!blob){ notice('Could not render the list image.'); return; }
      var name = 'screening-room-' + (state.tab==='wishlist' ? 'waiting' : state.tab) + '-list.png';
      var text = listShareText(items, heading);
      var file = null;
      try{ file = new File([blob], name, {type:'image/png'}); }catch(e){}
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file], text:text}).catch(function(err){
          if(!err || err.name !== 'AbortError'){ downloadBlob(blob, name); }
        });
      }else if(navigator.share){
        navigator.share({text:text}).then(function(){ downloadBlob(blob, name); notice('Image saved to share alongside.'); })
          .catch(function(err){ if(!err || err.name !== 'AbortError'){ downloadBlob(blob, name); } });
      }else{
        downloadBlob(blob, name);
        notice('List image saved to downloads.');
      }
    }, 'image/png');
  });
}

function listShareBtn(items){
